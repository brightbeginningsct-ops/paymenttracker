<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bright Beginnings · Payments</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    /* ── EXACT TIMECLOCK CSS VARIABLES ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f6fb; --surface: #fff; --surface2: #f0f4fa; --border: #dce3f0;
      --yellow: #f9c522; --yw-lt: #fff8d6; --yw-dk: #9a6a00;
      --blue: #3bbde0; --bl-lt: #e0f6fc; --bl-dk: #1a8fb0;
      --pink: #f48fb1; --pk-lt: #fde9f1; --pk-dk: #b94f7a;
      --green: #55b86e; --gn-lt: #e6f5ea; --gn-dk: #2e7d42;
      --red: #e8534e; --rd-lt: #fdecea; --rd-dk: #b02020;
      --text: #28304a; --text2: #5a618a; --muted: #9aa3c5;
      --font: 'Nunito', sans-serif; --display: 'Fredoka One', cursive; --mono: 'JetBrains Mono', monospace;
      --r: 14px; --sh: 0 2px 12px rgba(40,48,74,.08); --sh2: 0 6px 28px rgba(40,48,74,.13);
    }
    
    html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; overflow: hidden; }
    #app { height: 100%; display: flex; }

    /* UTILITY BUTTONS */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 20px; border: none; border-radius: 100px; font-family: var(--font); font-size: 14px; font-weight: 800; cursor: pointer; transition: all .14s; user-select: none; white-space: nowrap; }
    .btn:active { transform: scale(.95); }
    .btn-y { background: var(--yellow); color: var(--yw-dk); box-shadow: 0 3px 10px rgba(249,197,34,.4); }
    .btn-b { background: var(--blue); color: #fff; box-shadow: 0 3px 10px rgba(59,189,224,.35); }
    .btn-g { background: var(--surface); color: var(--text2); border: 1.5px solid var(--border); }
    .btn-pk { background: var(--pink); color: #fff; box-shadow: 0 3px 10px rgba(244,143,177,.35); }
    .btn-rd { background: var(--rd-lt); color: var(--rd-dk); border: 1.5px solid rgba(232,83,78,.25); }
    .btn-full { width: 100%; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    input, select { background: var(--surface2); border: 1.5px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 14px; font-family: var(--font); font-size: 15px; width: 100%; outline: none; transition: border-color 0.15s; }
    input:focus, select:focus { border-color: var(--blue); background: var(--surface); box-shadow: 0 0 0 3px var(--bl-lt); }
    label { font-size: 13px; color: var(--text2); font-weight: 800; display: block; margin-bottom: 6px; }
    .field { margin-bottom: 16px; }
    .checkbox-label { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--text); cursor: pointer; margin-top: 6px; }
    .checkbox-label input { width: 16px; height: 16px; margin: 0; }

    .badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 100px; font-size: 12px; font-weight: 800; }
    .badge-gn { background: var(--gn-lt); color: var(--gn-dk); }
    .badge-rd { background: var(--rd-lt); color: var(--rd-dk); }
    .badge-pk { background: var(--pk-lt); color: var(--pk-dk); }

    /* LAYOUT: SIDEBAR NAVIGATION */
    .sidebar { width: 260px; background: var(--surface); border-right: 1.5px solid var(--border); display: flex; flex-direction: column; z-index: 10; box-shadow: 2px 0 12px rgba(40,48,74,.05); }
    .brand-area { padding: 24px; border-bottom: 1.5px solid var(--border); }
    .brand { font-family: var(--display); font-size: 24px; color: var(--blue); letter-spacing: 0.5px; line-height: 1.2; }
    .nav-menu { padding: 20px 12px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .nav-item { padding: 12px 16px; border-radius: 12px; font-weight: 800; color: var(--text2); cursor: pointer; transition: 0.15s; display: flex; align-items: center; gap: 10px; border: 1.5px solid transparent; }
    .nav-item:hover { background: var(--bg); color: var(--text); }
    .nav-item.active { background: var(--bl-lt); color: var(--bl-dk); border-color: var(--blue); }

    /* LAYOUT: MAIN CONTENT AREA */
    .main-content { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow-y: auto; }
    .topbar { padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; }
    .content-wrap { padding: 0 32px 40px; max-width: 1100px; margin: 0 auto; width: 100%; }

    /* DASHBOARD OVERVIEW */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .card { background: var(--surface); border-radius: var(--r); padding: 24px; box-shadow: var(--sh); border: 1.5px solid transparent; }
    .stat-label { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 8px; }
    .stat-value { font-family: var(--display); font-size: 32px; letter-spacing: 1px; }
    .val-owed { color: var(--red); }
    .val-collected { color: var(--green); }

    .table-wrap { background: var(--surface); border-radius: var(--r); overflow: hidden; box-shadow: var(--sh); border: 1.5px solid var(--border); }
    .data-table { width: 100%; border-collapse: collapse; font-size: 15px; text-align: left; }
    .data-table th { background: var(--surface2); padding: 14px 20px; font-size: 13px; font-weight: 800; color: var(--text2); border-bottom: 1.5px solid var(--border); }
    .data-table td { padding: 16px 20px; border-bottom: 1.5px solid var(--border); vertical-align: middle; font-weight: 600; }
    .data-table tr:last-child td { border-bottom: none; }
    
    /* Interactive Rows */
    .row-clickable { cursor: pointer; transition: 0.1s; }
    .row-clickable:hover td { background: var(--surface2); }
    .col-mono { font-family: var(--mono); }

    /* CUSTOMER DETAIL VIEW */
    .detail-header { background: var(--surface); border-radius: var(--r); padding: 24px 32px; box-shadow: var(--sh); border: 1.5px solid var(--border); margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-start; }
    .detail-title { font-family: var(--display); font-size: 32px; color: var(--text); margin-bottom: 8px; display:flex; align-items:center; gap:16px;}
    .contact-strip { display: flex; gap: 20px; font-size: 13px; color: var(--text2); font-weight: 600; margin-bottom: 24px; flex-wrap: wrap; }
    .contact-item { display: flex; align-items: center; gap: 6px; }
    .assign-box { background: var(--surface2); padding: 20px; border-radius: 12px; border: 1.5px solid var(--border); width: 420px; }
    .bal-box { text-align: right; }
    
    /* MODALS */
    .modal-overlay { position: fixed; inset: 0; background: rgba(40,48,74,0.6); display: flex; align-items: center; justify-content: center; z-index: 500; padding: 20px; animation: fadeIn 0.15s; backdrop-filter: blur(3px); }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal { background: var(--surface); border-radius: 24px; padding: 32px; width: 100%; max-width: 480px; animation: scaleIn 0.15s; box-shadow: var(--sh2); border: 2px solid var(--border); }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .modal h2 { font-family: var(--display); font-size: 24px; color: var(--text); margin-bottom: 24px; }
    
    /* Select Optgroups */
    optgroup { font-family: var(--font); font-weight: 800; color: var(--blue); }
  </style>
</head>
<body>
<div id="app"></div>

<script type="module">
// ─── FIREBASE CONFIGURATION ───
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getDatabase, ref, set as fbSet, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

// Your Bright Beginnings Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyAsUF58_SpcTCNGGirwhHd5bfS_4JE4QcM",
  authDomain: "bright-beginnings-timeclock.firebaseapp.com",
  databaseURL: "https://bright-beginnings-timeclock-default-rtdb.firebaseio.com",
  projectId: "bright-beginnings-timeclock",
  storageBucket: "bright-beginnings-timeclock.firebasestorage.app",
  messagingSenderId: "873798614696",
  appId: "1:873798614696:web:9f0bebaafb146cc0b30c9d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// --- UTILS ---
const genId = () => Math.random().toString(36).substr(2, 9);
function fmtH(h) { return (h || 0).toFixed(2); }
const now = new Date();
function getNextMonday() { const d = new Date(now); d.setDate(d.getDate() + ((1 + 7 - d.getDay()) % 7 || 7)); return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
function getNextMonth() { const d = new Date(now); d.setMonth(d.getMonth() + 1); return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }); }

// --- DATABASE & CLOUD STATE ---
// Clean v7 state - No PDF Generator logic included, and NO hardcoded overwrite
let dbCache = {
  pt_programs_v7: [],
  pt_charges_v7: [],
  pt_customers_v7: [],
  pt_txns_v7: []
};

const DB = {
  getPrograms() { return dbCache.pt_programs_v7 || []; },
  getCharges() { return dbCache.pt_charges_v7 || []; },
  getCustomers() { return dbCache.pt_customers_v7 || []; },
  getTxns() { return dbCache.pt_txns_v7 || []; },
  set(k, v) {
    dbCache[k] = v; 
    fbSet(ref(db, 'bb_payments_system/' + k), v); 
  }
};

let S = { 
  view: 'dashboard', 
  selCustId: null, 
  showModal: null,
  tempId: null,
  draftPrograms: [] 
};

function set(patch) { Object.assign(S, patch); render(); }
window.set = set; 

function getCustomerBalance(custId) {
  return DB.getTxns()
    .filter(t => t.custId === custId)
    .reduce((sum, t) => sum + (t.type === 'charge' ? t.amount : -t.amount), 0);
}

// --- CLOUD SYNC ---
// This is the fix. It ONLY reads data, it NEVER overwrites with test data.
onValue(ref(db, 'bb_payments_system'), (snapshot) => {
  const data = snapshot.val();
  
  if (data) {
    dbCache = { ...dbCache, ...data };
    render(); 
  } else {
    console.log("Waiting for data...");
  }
});

// --- RENDER ENGINE ---
function render() {
  const app = document.getElementById('app');
  
  let mainContentHtml = '';
  let viewTitle = '';

  if (S.view === 'dashboard') {
    mainContentHtml = renderDashboard();
    viewTitle = 'Dashboard Overview';
  } else if (S.view === 'programs') {
    mainContentHtml = renderPrograms();
    viewTitle = 'Programs';
  } else if (S.view === 'charges') {
    mainContentHtml = renderCharges();
    viewTitle = 'Standard Charges';
  } else if (S.view === 'customer') {
    mainContentHtml = renderCustomerDetail();
    viewTitle = 'Family Ledger';
  }

  app.innerHTML = `
    <aside class="sidebar">
      <div class="brand-area">
        <div class="brand">Bright Beginnings<br><span style="color:var(--pink)">Payments</span></div>
      </div>
      <nav class="nav-menu">
        <div class="nav-item ${S.view === 'dashboard' ? 'active' : ''}" data-a="nav" data-view="dashboard">
          📊 Dashboard Overview
        </div>
        <div class="nav-item ${S.view === 'programs' ? 'active' : ''}" data-a="nav" data-view="programs">
          📋 Programs
        </div>
        <div class="nav-item ${S.view === 'charges' ? 'active' : ''}" data-a="nav" data-view="charges">
          💸 Standard Charges
        </div>
        <div style="height: 1.5px; background: var(--border); margin: 8px 0"></div>
        <div class="nav-item" data-a="open-modal" data-m="add-customer">
          👨‍👩‍👧‍👦 Add New Family
        </div>
      </nav>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <h2 style="font-size: 20px; font-weight: 800; color: var(--text2)">
          ${viewTitle}
        </h2>
      </div>
      <div class="content-wrap">
        ${mainContentHtml}
      </div>
    </main>

    ${renderModal()}
  `;

  bindEvents();
}

function renderDashboard() {
  const allCustomers = DB.getCustomers();
  const programs = DB.getPrograms();
  const txns = DB.getTxns();

  const activeCusts = allCustomers.filter(c => !c.archived);
  const archivedCusts = allCustomers.filter(c => c.archived);

  let totalOwed = 0, totalCollected = 0;
  activeCusts.forEach(c => { const bal = getCustomerBalance(c.id); if (bal > 0) totalOwed += bal; });
  txns.forEach(t => { if (t.type === 'payment') totalCollected += t.amount; });

  return `
    <div class="stats-grid">
      <div class="card" style="background: var(--rd-lt); border-color: rgba(232,83,78,.25)">
        <div class="stat-label">Active Outstanding</div>
        <div class="stat-value val-owed">$${fmtH(totalOwed)}</div>
      </div>
      <div class="card" style="background: var(--gn-lt); border-color: rgba(85,184,110,.25)">
        <div class="stat-label">Total Collected</div>
        <div class="stat-value val-collected">$${fmtH(totalCollected)}</div>
      </div>
      <div class="card" style="background: var(--bl-lt); border-color: rgba(59,189,224,.25)">
        <div class="stat-label">Active Families</div>
        <div class="stat-value" style="color: var(--bl-dk)">${activeCusts.length}</div>
      </div>
    </div>

    <h3 style="margin-bottom: 16px; font-size: 18px; font-weight: 800;">Billing Status Directory</h3>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>Family Name</th><th>Assigned Programs</th><th>Combined Rate</th><th>Current Balance</th></tr></thead>
        <tbody>
          ${activeCusts.length === 0 ? `<tr><td colspan="4" style="text-align:center; color:var(--muted); padding: 40px;">No active customers.</td></tr>` : ''}
          ${activeCusts.map(c => {
            const custProgs = (c.progs || []).map(cp => {
              const p = programs.find(x => x.id === cp.id);
              return p ? { ...p, disc: cp.disc } : null;
            }).filter(Boolean);
            
            const bal = getCustomerBalance(c.id);
            
            const progBadges = custProgs.length > 0 
              ? custProgs.map(p => `
                  <div class="badge" style="background:var(--surface2); color:var(--text2); margin-bottom:4px;">
                    ${p.name} ${p.disc ? '<span style="color:var(--pk-dk); margin-left:4px">(Discounted)</span>' : ''}
                  </div>
                `).join('<br>')
              : '<span style="color:var(--muted)">Unassigned</span>';

            const weeklyRate = custProgs.filter(p => p.freq === 'weekly').reduce((s, p) => s + (p.rate * (1 - p.disc/100)), 0);
            const monthlyRate = custProgs.filter(p => p.freq === 'monthly').reduce((s, p) => s + (p.rate * (1 - p.disc/100)), 0);
            let rateTexts = [];
            if (weeklyRate > 0) rateTexts.push(`$${fmtH(weeklyRate)} / wk`);
            if (monthlyRate > 0) rateTexts.push(`$${fmtH(monthlyRate)} / mo`);
            const rateDisplay = rateTexts.length > 0 ? rateTexts.join('<br>') : '—';

            return `
              <tr class="row-clickable" data-a="sel-cust" data-cust="${c.id}">
                <td style="font-weight: 800; color: var(--blue)">${c.name}</td>
                <td>${progBadges}</td>
                <td class="col-mono" style="font-size: 14px; color: var(--text2); line-height: 1.5;">${rateDisplay}</td>
                <td class="col-mono ${bal > 0 ? 'val-owed' : bal < 0 ? 'val-collected' : ''}">
                  ${bal > 0 ? '$'+fmtH(bal) : bal === 0 ? 'Paid' : '+$'+fmtH(Math.abs(bal))}
                </td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>

    ${archivedCusts.length > 0 ? `
      <h3 style="margin-top: 48px; margin-bottom: 16px; font-size: 18px; font-weight: 800; color: var(--text2);">Archived / Inactive Families</h3>
      <div class="table-wrap" style="opacity: 0.7;">
        <table class="data-table">
          <thead><tr><th>Family Name</th><th>Assigned Programs</th><th>Combined Rate</th><th>Current Balance</th></tr></thead>
          <tbody>
            ${archivedCusts.map(c => {
              const custProgs = (c.progs || []).map(cp => {
                const p = programs.find(x => x.id === cp.id);
                return p ? { ...p, disc: cp.disc } : null;
              }).filter(Boolean);
              
              const bal = getCustomerBalance(c.id);
              
              const progBadges = custProgs.length > 0 
                ? custProgs.map(p => `
                    <div class="badge" style="background:var(--surface2); color:var(--text2); margin-bottom:4px;">
                      ${p.name} ${p.disc ? '<span style="color:var(--pk-dk); margin-left:4px">(Discounted)</span>' : ''}
                    </div>
                  `).join('<br>')
                : '<span style="color:var(--muted)">Unassigned</span>';

              const weeklyRate = custProgs.filter(p => p.freq === 'weekly').reduce((s, p) => s + (p.rate * (1 - p.disc/100)), 0);
              const monthlyRate = custProgs.filter(p => p.freq === 'monthly').reduce((s, p) => s + (p.rate * (1 - p.disc/100)), 0);
              let rateTexts = [];
              if (weeklyRate > 0) rateTexts.push(`$${fmtH(weeklyRate)} / wk`);
              if (monthlyRate > 0) rateTexts.push(`$${fmtH(monthlyRate)} / mo`);
              const rateDisplay = rateTexts.length > 0 ? rateTexts.join('<br>') : '—';

              return `
                <tr class="row-clickable" data-a="sel-cust" data-cust="${c.id}">
                  <td style="font-weight: 800; color: var(--text2)">${c.name}</td>
                  <td>${progBadges}</td>
                  <td class="col-mono" style="font-size: 14px; color: var(--text2); line-height: 1.5;">${rateDisplay}</td>
                  <td class="col-mono ${bal > 0 ? 'val-owed' : bal < 0 ? 'val-collected' : ''}">
                    ${bal > 0 ? '$'+fmtH(bal) : bal === 0 ? 'Paid' : '+$'+fmtH(Math.abs(bal))}
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    ` : ''}
  `;
}

function renderPrograms() {
  const programs = DB.getPrograms();
  return `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 24px;">
      <p style="color: var(--text2); font-weight: 600; max-width: 600px;">
        Manage your rate sheet below. Click on any existing program to update its pricing or delete it.
      </p>
      <button class="btn btn-y" data-a="open-modal" data-m="edit-program">+ Create Program</button>
    </div>
    
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>Program Name</th><th>Rate ($)</th><th>Billing Frequency</th></tr></thead>
        <tbody>
          ${programs.length === 0 ? `<tr><td colspan="3" style="text-align:center; color:var(--muted); padding: 40px;">No programs created yet.</td></tr>` : ''}
          ${programs.map(p => `
            <tr class="row-clickable" data-a="edit-prog" data-id="${p.id}">
              <td style="font-weight: 800; color: var(--blue)">${p.name}</td>
              <td class="col-mono" style="font-size: 15px; color: var(--text)">$${fmtH(p.rate)}</td>
              <td style="text-transform: capitalize; color: var(--text2); font-weight: 700;">${p.freq}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderCharges() {
  const charges = DB.getCharges();
  return `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 24px;">
      <p style="color: var(--text2); font-weight: 600; max-width: 600px;">
        Manage your reusable, standard fees here (like Half Days or Late Fees) for quick access when billing.
      </p>
      <button class="btn btn-pk" data-a="open-modal" data-m="edit-charge">+ Create Charge</button>
    </div>
    
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>Standard Charge Name</th><th>Amount ($)</th></tr></thead>
        <tbody>
          ${charges.length === 0 ? `<tr><td colspan="2" style="text-align:center; color:var(--muted); padding: 40px;">No standard charges created yet.</td></tr>` : ''}
          ${charges.map(c => `
            <tr class="row-clickable" data-a="edit-charge" data-id="${c.id}">
              <td style="font-weight: 800; color: var(--blue)">${c.name}</td>
              <td class="col-mono" style="font-size: 15px; color: var(--text)">$${fmtH(c.amount)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderCustomerDetail() {
  const activeCust = DB.getCustomers().find(c => c.id === S.selCustId);
  if (!activeCust) return '';

  const programs = DB.getPrograms();
  const txns = DB.getTxns().filter(t => t.custId === activeCust.id).sort((a,b) => new Date(b.date) - new Date(a.date));
  const activeBal = getCustomerBalance(activeCust.id);

  const savedStr = JSON.stringify(activeCust.progs || []);
  const draftStr = JSON.stringify(S.draftPrograms);
  const isDraftDirty = savedStr !== draftStr;

  return `
    <button class="btn btn-g" style="margin-bottom: 20px" data-a="nav" data-view="dashboard">← Back to Directory</button>
    
    <div class="detail-header">
      <div>
        <div class="detail-title">
          ${activeCust.name}
          ${activeCust.archived ? '<span class="badge badge-rd" style="font-size: 12px;">Archived</span>' : ''}
          <button class="btn btn-g btn-sm" style="font-weight: 700; color:var(--muted);" data-a="open-modal" data-m="edit-customer">✏️ Edit Info</button>
        </div>
        
        <div class="contact-strip">
          <div class="contact-item">📧 ${activeCust.email || '<span style="color:var(--border)">No Email</span>'}</div>
          <div class="contact-item">📞 ${activeCust.phone || '<span style="color:var(--border)">No Phone</span>'}</div>
          <div class="contact-item">📍 ${activeCust.address || '<span style="color:var(--border)">No Address</span>'}</div>
        </div>
        
        <div class="assign-box" style="${activeCust.archived ? 'opacity: 0.6; pointer-events: none;' : ''}">
          <label style="margin-bottom: 10px; font-size: 14px;">Assigned Programs</label>
          
          <div style="display:flex; flex-direction:column; gap:8px; margin-bottom: 12px; max-height: 280px; overflow-y: auto; padding-right: 4px;">
            ${S.draftPrograms.length === 0 ? '<div style="color:var(--muted); font-size:13px; font-style:italic;">No programs assigned.</div>' : ''}
            ${S.draftPrograms.map(dp => {
              const p = programs.find(x => x.id === dp.id);
              if(!p) return '';
              const isDiscounted = dp.disc === 10;
              const currentRate = p.rate * (1 - (dp.disc/100));
              return `
                <div style="background:var(--surface); padding:12px; border-radius:8px; border:1.5px solid var(--border);">
                  <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <span style="font-size:14px; font-weight:800; color:var(--text); line-height: 1.3;">
                      ${p.name}<br>
                      <span style="color: ${isDiscounted ? 'var(--pk-dk)' : 'var(--text2)'}; font-family:var(--mono)">
                        $${fmtH(currentRate)}/${p.freq} ${isDiscounted ? '(10% Off)' : ''}
                      </span>
                    </span>
                    <button class="btn btn-g" style="padding:6px 10px; font-size:11px;" data-a="remove-draft-prog" data-id="${p.id}">Remove</button>
                  </div>
                  <label class="checkbox-label">
                    <input type="checkbox" data-a="toggle-discount" data-id="${p.id}" ${isDiscounted ? 'checked' : ''}>
                    Apply 10% Sibling Discount
                  </label>
                </div>
              `;
            }).join('')}
          </div>
          
          <div style="display:flex; gap:8px; margin-bottom: 16px;">
            <select id="draft-prog-select" style="flex:1; padding:8px; font-size:13px;">
              <option value="">-- Select to Add --</option>
              ${programs.filter(p => !S.draftPrograms.find(dp => dp.id === p.id)).map(p => `<option value="${p.id}">${p.name}</option>`).join('')}
            </select>
            <button class="btn btn-b" data-a="add-draft-prog">Add</button>
          </div>
          
          <button class="btn btn-pk btn-full" style="opacity: ${isDraftDirty ? '1' : '0.5'}" data-a="apply-draft-progs" ${isDraftDirty ? '' : 'disabled'}>
            ${isDraftDirty ? 'Apply Changes' : 'Saved'}
          </button>
        </div>
      </div>
      
      <div class="bal-box">
        <div class="stat-label">Current Balance</div>
        <div class="stat-value ${activeBal > 0 ? 'val-owed' : 'val-collected'}" style="margin-bottom: 16px;">
          ${activeBal > 0 ? '$'+fmtH(activeBal) : 'Paid'}
        </div>
        <div style="display:flex; gap:10px; justify-content: flex-end;">
          <button class="btn btn-pk" data-a="open-modal" data-m="add-charge">+ Add Charge</button>
          <button class="btn btn-y" data-a="open-modal" data-m="add-payment">$ Receive Payment</button>
        </div>
      </div>
    </div>

    <h3 style="margin-bottom: 16px; font-size: 18px; font-weight: 800;">Ledger Timeline</h3>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>Date</th><th>Type</th><th>Description</th><th>Amount</th></tr></thead>
        <tbody>
          ${txns.length === 0 ? '<tr><td colspan="4" style="text-align:center; color:var(--muted); padding: 40px;">No transaction history yet.</td></tr>' : ''}
          ${txns.map(t => {
            let extraBadge = '';
            let linkedNote = '';
            
            if (t.type === 'charge') {
               const linkedPmt = txns.find(p => p.type === 'payment' && p.linkedToId === t.id);
               if (linkedPmt) {
                  extraBadge = '<span class="badge badge-gn" style="margin-left: 8px;">Paid</span>';
               } else {
                  extraBadge = '<span class="badge badge-rd" style="margin-left: 8px;">Unpaid</span>';
               }
            } else if (t.type === 'payment' && t.linkedToId) {
               const linkedCharge = txns.find(c => c.id === t.linkedToId);
               if (linkedCharge) {
                  linkedNote = `<br><span style="font-size:11px; color:var(--muted)">↳ Applied to ${new Date(linkedCharge.date).toLocaleDateString()} charge</span>`;
               }
            }

            return `
              <tr>
                <td class="col-mono" style="font-weight:600">${new Date(t.date).toLocaleDateString()}</td>
                <td><span class="badge badge-${t.type === 'payment' ? 'gn' : 'rd'}">${t.type === 'payment' ? 'Payment' : 'Charge'}</span>${extraBadge}</td>
                <td style="color:var(--text); font-weight:600">${t.note}${linkedNote}</td>
                <td class="col-mono ${t.type === 'payment' ? 'val-collected' : 'val-owed'}">
                  ${t.type === 'payment' ? '-' : ''}$${fmtH(t.amount)}
                </td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function updateChargeDesc() {
  const select = document.getElementById('m-quick-rates');
  if(!select || select.selectedIndex === -1) return;
  const opt = select.options[select.selectedIndex];
  
  const amtField = document.getElementById('m-amt');
  const noteField = document.getElementById('m-note');
  
  amtField.value = opt.value;
  
  const type = opt.getAttribute('data-type');
  const name = opt.getAttribute('data-name');
  const freq = opt.getAttribute('data-freq');

  if (type === 'program') {
    noteField.value = freq === 'weekly' ? `${name} - Week of ${getNextMonday()}` : `${name} - Tuition for ${getNextMonth()}`;
  } else if (type === 'charge') {
    noteField.value = name;
  } else {
    noteField.value = '';
  }
}

function renderModal() {
  if (!S.showModal) return '';
  const activeCust = DB.getCustomers().find(c => c.id === S.selCustId);
  const programs = DB.getPrograms();
  const charges = DB.getCharges();

  if (S.showModal === 'add-customer' || S.showModal === 'edit-customer') {
    const isEdit = S.showModal === 'edit-customer';
    const cust = isEdit ? activeCust : { name: '', email: '', phone: '', address: '', archived: false };
    
    return `
      <div class="modal-overlay">
        <div class="modal">
          <h2>${isEdit ? 'Edit Family Info' : 'Add New Family'}</h2>
          
          <div class="field">
            <label>Family Name</label>
            <input type="text" id="m-name" value="${cust.name}" placeholder="e.g. Smith Family" autocomplete="off">
          </div>
          
          <div style="display:flex; gap:12px">
            <div class="field" style="flex:1">
              <label>Email Address</label>
              <input type="email" id="m-email" value="${cust.email}" placeholder="name@example.com">
            </div>
            <div class="field" style="flex:1">
              <label>Phone Number</label>
              <input type="tel" id="m-phone" value="${cust.phone}" placeholder="(555) 555-5555">
            </div>
          </div>
          
          <div class="field">
            <label>Mailing Address</label>
            <input type="text" id="m-address" value="${cust.address}" placeholder="123 Main St, City, ST 12345">
          </div>

          <div style="display:flex; gap:12px; margin-top:28px">
            <button class="btn btn-b btn-full" data-a="save-customer" data-edit="${isEdit}">${isEdit ? 'Save Changes' : 'Create Family'}</button>
            <button class="btn btn-g btn-full" data-a="close-modal">Cancel</button>
          </div>

          ${isEdit ? `
            <div style="margin-top: 24px; border-top: 1.5px solid var(--border); padding-top: 24px;">
              <button class="btn ${cust.archived ? 'btn-g' : 'btn-rd'} btn-full" data-a="archive-customer">
                ${cust.archived ? 'Restore Family to Active Status' : 'Archive / Deactivate Family'}
              </button>
              ${cust.archived ? `
              <button class="btn btn-rd btn-full" data-a="delete-customer" style="margin-top: 12px;">
                Delete Family Permanently
              </button>
              ` : ''}
            </div>
          ` : ''}
        </div>
      </div>
    `;
  }

  if (S.showModal === 'edit-program') {
    const isEdit = !!S.tempId;
    const prog = isEdit ? programs.find(p => p.id === S.tempId) : { name: '', rate: '', freq: 'weekly' };
    
    return `
      <div class="modal-overlay">
        <div class="modal">
          <h2>${isEdit ? 'Edit Program' : 'Create Program'}</h2>
          <div class="field"><label>Program Name</label><input type="text" id="m-prog-name" value="${prog.name}" placeholder="e.g. Infant Care"></div>
          <div class="field"><label>Rate Price ($)</label><input type="number" id="m-prog-rate" step="0.01" value="${prog.rate}" placeholder="0.00"></div>
          <div class="field">
            <label>Billing Frequency</label>
            <select id="m-prog-freq">
              <option value="weekly" ${prog.freq === 'weekly' ? 'selected' : ''}>Weekly</option>
              <option value="monthly" ${prog.freq === 'monthly' ? 'selected' : ''}>Monthly</option>
            </select>
          </div>
          <div style="display:flex; gap:12px; margin-top:28px">
            <button class="btn btn-y btn-full" data-a="save-program">Save</button>
            ${isEdit ? `<button class="btn btn-rd" data-a="delete-program">Delete</button>` : ''}
            <button class="btn btn-g btn-full" data-a="close-modal">Cancel</button>
          </div>
        </div>
      </div>
    `;
  }

  if (S.showModal === 'edit-charge') {
    const isEdit = !!S.tempId;
    const charge = isEdit ? charges.find(c => c.id === S.tempId) : { name: '', amount: '' };
    
    return `
      <div class="modal-overlay">
        <div class="modal">
          <h2>${isEdit ? 'Edit Standard Charge' : 'Create Standard Charge'}</h2>
          <div class="field"><label>Charge Name</label><input type="text" id="m-charge-name" value="${charge.name}" placeholder="e.g. Half Day Fee"></div>
          <div class="field"><label>Amount ($)</label><input type="number" id="m-charge-amt" step="0.01" value="${charge.amount}" placeholder="0.00"></div>
          <div style="display:flex; gap:12px; margin-top:28px">
            <button class="btn btn-pk btn-full" data-a="save-charge">Save</button>
            ${isEdit ? `<button class="btn btn-rd" data-a="delete-charge">Delete</button>` : ''}
            <button class="btn btn-g btn-full" data-a="close-modal">Cancel</button>
          </div>
        </div>
      </div>
    `;
  }

  if (S.showModal === 'add-charge') {
    const custProgs = (activeCust.progs || []).map(cp => {
      const p = programs.find(x => x.id === cp.id);
      return p ? { ...p, disc: cp.disc } : null;
    }).filter(Boolean);

    return `
      <div class="modal-overlay">
        <div class="modal">
          <h2>Add Charge</h2>
          <p style="font-size: 14px; font-weight: 800; color: var(--text2); margin-bottom: 20px;">Billing: <strong style="color: var(--blue)">${activeCust?.name}</strong></p>
          <div class="field"><label>Invoice Date</label><input type="date" id="m-date" value="${now.toISOString().split('T')[0]}"></div>
          
          <div class="field">
            <label>Quick Fill</label>
            <select id="m-quick-rates" data-i="rate-select">
              <option value="">-- Custom Charge --</option>
              ${custProgs.length > 0 ? `
                <optgroup label="Family's Assigned Programs">
                  ${custProgs.map(cp => {
                    const finalAmt = cp.rate * (1 - cp.disc/100);
                    return `<option value="${finalAmt}" data-type="program" data-name="${cp.name}" data-freq="${cp.freq}">${cp.name} ${cp.disc ? '(Discounted)' : ''} - $${fmtH(finalAmt)}</option>`;
                  }).join('')}
                </optgroup>
              ` : ''}
              <optgroup label="Standard Charges">
                ${charges.map(ch => `<option value="${ch.amount}" data-type="charge" data-name="${ch.name}">${ch.name} - $${fmtH(ch.amount)}</option>`).join('')}
              </optgroup>
            </select>
          </div>
          
          <div class="field"><label>Amount ($)</label><input type="number" id="m-amt" step="0.01" placeholder="0.00"></div>
          <div class="field"><label>Description</label><input type="text" id="m-note" placeholder="e.g. Tuition"></div>
          <div style="display:flex; gap:12px; margin-top:28px">
            <button class="btn btn-pk btn-full" data-a="save-tx" data-type="charge">Apply Charge</button>
            <button class="btn btn-g btn-full" data-a="close-modal">Cancel</button>
          </div>
        </div>
      </div>
    `;
  }

  if (S.showModal === 'add-payment') {
    const activeBal = getCustomerBalance(activeCust.id);
    const allTxns = DB.getTxns();
    
    const unpaidCharges = allTxns.filter(t => 
      t.custId === activeCust.id && 
      t.type === 'charge' && 
      !allTxns.some(p => p.type === 'payment' && p.linkedToId === t.id)
    );

    return `
      <div class="modal-overlay">
        <div class="modal">
          <h2>Receive Payment</h2>
          <p style="font-size: 14px; font-weight: 800; color: var(--text2); margin-bottom: 20px;">Receiving from: <strong style="color: var(--blue)">${activeCust?.name}</strong></p>
          
          <div class="field">
            <label>Apply to Specific Charge (Optional)</label>
            <select id="m-linked-charge" data-a="select-linked-charge">
              <option value="">-- General Payment (Unlinked) --</option>
              ${unpaidCharges.map(c => `
                <option value="${c.id}" data-amt="${c.amount}">
                  ${new Date(c.date).toLocaleDateString()} - ${c.note} ($${fmtH(c.amount)})
                </option>
              `).join('')}
            </select>
          </div>

          <div class="field"><label>Date Received</label><input type="date" id="m-date" value="${now.toISOString().split('T')[0]}"></div>
          <div class="field"><label>Amount Paid ($)</label><input type="number" id="m-amt" step="0.01" value="${activeBal > 0 ? fmtH(activeBal) : ''}" placeholder="0.00"></div>
          <div class="field"><label>Payment Method / Note</label><input type="text" id="m-note" placeholder="e.g. Venmo, Check #1234"></div>
          <div style="display:flex; gap:12px; margin-top:28px">
            <button class="btn btn-y btn-full" data-a="save-tx" data-type="payment">Log Payment</button>
            <button class="btn btn-g btn-full" data-a="close-modal">Cancel</button>
          </div>
        </div>
      </div>
    `;
  }
  return '';
}

function bindEvents() {
  document.querySelectorAll('input[data-a="toggle-discount"]').forEach(chk => {
    chk.onchange = (e) => {
      const id = e.target.getAttribute('data-id');
      const draft = S.draftPrograms.map(dp => {
        if (dp.id === id) return { ...dp, disc: e.target.checked ? 10 : 0 };
        return dp;
      });
      set({ draftPrograms: draft });
    };
  });

  const rateSelect = document.getElementById('m-quick-rates');
  if(rateSelect) {
    rateSelect.onchange = () => updateChargeDesc();
  }

  const linkSelect = document.getElementById('m-linked-charge');
  if(linkSelect) {
    linkSelect.onchange = (e) => {
      if (e.target.selectedIndex > 0) {
        const opt = e.target.options[e.target.selectedIndex];
        const amt = opt.getAttribute('data-amt');
        document.getElementById('m-amt').value = amt;
      }
    };
  }

  document.querySelectorAll('[data-a]').forEach(btn => {
    btn.onclick = () => {
      const action = btn.getAttribute('data-a');

      if (action === 'nav') set({ view: btn.getAttribute('data-view') });
      if (action === 'open-modal') set({ showModal: btn.getAttribute('data-m'), tempId: null });
      if (action === 'close-modal') set({ showModal: null, tempId: null });
      
      if (action === 'sel-cust') {
        const custId = btn.getAttribute('data-cust');
        const cust = DB.getCustomers().find(c => c.id === custId);
        set({ 
          view: 'customer', 
          selCustId: custId,
          draftPrograms: cust && cust.progs ? JSON.parse(JSON.stringify(cust.progs)) : [] 
        });
      }
      
      if (action === 'add-draft-prog') {
        const selectEl = document.getElementById('draft-prog-select');
        if (selectEl && selectEl.value && !S.draftPrograms.find(dp => dp.id === selectEl.value)) {
          set({ draftPrograms: [...S.draftPrograms, {id: selectEl.value, disc: 0}] });
        }
      }
      if (action === 'remove-draft-prog') {
        const idToRemove = btn.getAttribute('data-id');
        set({ draftPrograms: S.draftPrograms.filter(dp => dp.id !== idToRemove) });
      }
      if (action === 'apply-draft-progs') {
        if (btn.hasAttribute('disabled')) return;
        const customers = DB.getCustomers();
        const idx = customers.findIndex(c => c.id === S.selCustId);
        if (idx > -1) {
          customers[idx].progs = [...S.draftPrograms];
          DB.set('pt_customers_v7', customers);
          set({}); 
        }
      }

      if (action === 'edit-prog') set({ showModal: 'edit-program', tempId: btn.getAttribute('data-id') });
      if (action === 'edit-charge') set({ showModal: 'edit-charge', tempId: btn.getAttribute('data-id') });

      if (action === 'save-customer') {
        const name = document.getElementById('m-name').value.trim();
        const email = document.getElementById('m-email').value.trim();
        const phone = document.getElementById('m-phone').value.trim();
        const address = document.getElementById('m-address').value.trim();
        
        if (!name) return;
        
        const isEdit = btn.getAttribute('data-edit') === 'true';
        const customers = DB.getCustomers();
        
        if (isEdit) {
          const idx = customers.findIndex(c => c.id === S.selCustId);
          if (idx > -1) {
            customers[idx].name = name;
            customers[idx].email = email;
            customers[idx].phone = phone;
            customers[idx].address = address;
            DB.set('pt_customers_v7', customers);
            set({ showModal: null });
          }
        } else {
          const newId = 'c_' + genId();
          customers.push({ id: newId, name, email, phone, address, progs: [], archived: false });
          DB.set('pt_customers_v7', customers);
          set({ showModal: null, view: 'customer', selCustId: newId, draftPrograms: [] });
        }
      }

      if (action === 'archive-customer') {
        if(confirm("Are you sure you want to change this family's active status?")) {
          const customers = DB.getCustomers();
          const idx = customers.findIndex(c => c.id === S.selCustId);
          if (idx > -1) {
            customers[idx].archived = !customers[idx].archived;
            DB.set('pt_customers_v7', customers);
            set({ showModal: null, view: 'dashboard', selCustId: null });
          }
        }
      }

      if (action === 'delete-customer') {
        if(confirm("Are you absolutely sure you want to permanently delete this family? This cannot be undone and their payment history will be deleted.")) {
          const customers = DB.getCustomers().filter(c => c.id !== S.selCustId);
          DB.set('pt_customers_v7', customers);
          
          const txns = DB.getTxns().filter(t => t.custId !== S.selCustId);
          DB.set('pt_txns_v7', txns);
          
          set({ showModal: null, view: 'dashboard', selCustId: null });
        }
      }

      if (action === 'save-program') {
        const name = document.getElementById('m-prog-name').value.trim();
        const rate = parseFloat(document.getElementById('m-prog-rate').value);
        const freq = document.getElementById('m-prog-freq').value;
        if (!name || isNaN(rate)) return;
        
        const programs = DB.getPrograms();
        if (S.tempId) {
          const idx = programs.findIndex(p => p.id === S.tempId);
          if (idx > -1) {
            programs[idx].name = name;
            programs[idx].rate = rate;
            programs[idx].freq = freq;
          }
        } else {
          programs.push({ id: 'p_' + genId(), name, rate, freq });
        }
        
        DB.set('pt_programs_v7', programs);
        set({ showModal: null, tempId: null });
      }

      if (action === 'delete-program') {
        if(confirm("Are you sure you want to delete this program?")) {
          const programs = DB.getPrograms().filter(p => p.id !== S.tempId);
          DB.set('pt_programs_v7', programs);
          
          const customers = DB.getCustomers().map(c => {
            if (c.progs) c.progs = c.progs.filter(dp => dp.id !== S.tempId);
            return c;
          });
          DB.set('pt_customers_v7', customers);
          
          set({ showModal: null, tempId: null });
        }
      }

      if (action === 'save-charge') {
        const name = document.getElementById('m-charge-name').value.trim();
        const amount = parseFloat(document.getElementById('m-charge-amt').value);
        if (!name || isNaN(amount)) return;
        
        const charges = DB.getCharges();
        if (S.tempId) {
          const idx = charges.findIndex(c => c.id === S.tempId);
          if (idx > -1) {
            charges[idx].name = name;
            charges[idx].amount = amount;
          }
        } else {
          charges.push({ id: 'ch_' + genId(), name, amount });
        }
        
        DB.set('pt_charges_v7', charges);
        set({ showModal: null, tempId: null });
      }

      if (action === 'delete-charge') {
        if(confirm("Are you sure you want to delete this standard charge?")) {
          const charges = DB.getCharges().filter(c => c.id !== S.tempId);
          DB.set('pt_charges_v7', charges);
          set({ showModal: null, tempId: null });
        }
      }

      if (action === 'save-tx') {
        const type = btn.getAttribute('data-type');
        const amount = parseFloat(document.getElementById('m-amt').value);
        const date = document.getElementById('m-date').value;
        const desc = document.getElementById('m-note').value.trim();
        if (isNaN(amount) || !date) return;

        let linkedToId = null;
        if (type === 'payment') {
          const linkedSelect = document.getElementById('m-linked-charge');
          if (linkedSelect && linkedSelect.value) {
            linkedToId = linkedSelect.value;
          }
        }

        const txns = DB.getTxns();
        txns.push({ 
          id: 'tx_' + genId(), 
          custId: S.selCustId, 
          type, 
          amount, 
          date, 
          note: desc || (type === 'charge' ? 'Manual Charge' : 'Payment'),
          linkedToId: linkedToId 
        });
        
        DB.set('pt_txns_v7', txns);
        set({ showModal: null });
      }
    };
  });
}

render();
</script>
</body>
</html>
