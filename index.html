    #app { height: 100%; display: flex; }

    .btn-y { background: var(--yellow); color: var(--yw-dk); box-shadow: 0 3px 10px rgba(249,197,34,.4); }
    .btn-b { background: var(--blue); color: #fff; box-shadow: 0 3px 10px rgba(59,189,224,.35); }
    .btn-g { background: var(--surface); color: var(--text2); border: 1.5px solid var(--border); }
    .btn-pk { background: var(--pink); color: #fff; box-shadow: 0 3px 10px rgba(244,143,177,.35); }
    .btn-rd { background: var(--rd-lt); color: var(--rd-dk); border: 1.5px solid rgba(232,83,78,.25); }
    .btn-full { width: 100%; } .btn-sm { padding: 6px 12px; font-size: 12px; }
    input, select { background: var(--surface2); border: 1.5px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 14px; font-family: var(--font); font-size: 15px; width: 100%; outline: none; transition: 0.15s; }
    input:focus, select:focus { border-color: var(--blue); background: var(--surface); box-shadow: 0 0 0 3px var(--bl-lt); }
    label { font-size: 13px; color: var(--text2); font-weight: 800; display: block; margin-bottom: 6px; }
    .field { margin-bottom: 16px; }
    .checkbox-label { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 6px; }
    .checkbox-label input { width: 16px; height: 16px; margin: 0; }
    .badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 100px; font-size: 12px; font-weight: 800; }
    .badge-gn { background: var(--gn-lt); color: var(--gn-dk); } .badge-rd { background: var(--rd-lt); color: var(--rd-dk); } .badge-pk { background: var(--pk-lt); color: var(--pk-dk); }
    .sidebar { width: 260px; background: var(--surface); border-right: 1.5px solid var(--border); display: flex; flex-direction: column; z-index: 10; box-shadow: 2px 0 12px rgba(40,48,74,.05); }
    .brand-area { padding: 24px; border-bottom: 1.5px solid var(--border); }
    .brand { font-family: var(--display); font-size: 24px; color: var(--blue); line-height: 1.2; }
    .nav-menu { padding: 20px 12px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .nav-item { padding: 12px 16px; border-radius: 12px; font-weight: 800; color: var(--text2); cursor: pointer; transition: 0.15s; display: flex; gap: 10px; border: 1.5px solid transparent; }
    .nav-item:hover { background: var(--bg); color: var(--text); } .nav-item.active { background: var(--bl-lt); color: var(--bl-dk); border-color: var(--blue); }
    .main-content { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow-y: auto; }
    .topbar { padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; }
    .content-wrap { padding: 0 32px 40px; max-width: 1100px; margin: 0 auto; width: 100%; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .card { background: var(--surface); border-radius: var(--r); padding: 24px; box-shadow: var(--sh); }
    .stat-label { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 8px; }
    .stat-value { font-family: var(--display); font-size: 32px; }
    .val-owed { color: var(--red); } .val-collected { color: var(--green); }
    .table-wrap { background: var(--surface); border-radius: var(--r); overflow: hidden; box-shadow: var(--sh); border: 1.5px solid var(--border); }
    .data-table { width: 100%; border-collapse: collapse; font-size: 15px; text-align: left; }
    .data-table th { background: var(--surface2); padding: 14px 20px; font-size: 13px; font-weight: 800; color: var(--text2); border-bottom: 1.5px solid var(--border); }

function renderDashboard() {
  const allCustomers = DB.getCustomers();
  const programs = DB.getPrograms();
  const txns = DB.getTxns();

  const activeCusts = allCustomers.filter(c => !c.archived);
  const archivedCusts = allCustomers.filter(c => c.archived);

  let totalOwed = 0, totalCollected = 0;
  activeCusts.forEach(c => { const bal = getCustomerBalance(c.id); if (bal > 0) totalOwed += bal; });
  txns.forEach(t => { if (t.type === 'payment') totalCollected += t.amount; });

  return `
    <div class="stats-grid">
      <div class="card" style="background: var(--rd-lt); border-color: rgba(232,83,78,.25)">
        <div class="stat-label">Active Outstanding</div><div class="stat-value val-owed">$${fmtH(totalOwed)}</div>
      </div>
      <div class="card" style="background: var(--gn-lt); border-color: rgba(85,184,110,.25)">
        <div class="stat-label">Total Collected</div><div class="stat-value val-collected">$${fmtH(totalCollected)}</div>
      </div>
      <div class="card" style="background: var(--bl-lt); border-color: rgba(59,189,224,.25)">
        <div class="stat-label">Active Families</div><div class="stat-value" style="color: var(--bl-dk)">${activeCusts.length}</div>
      </div>
    </div>

    <h3 style="margin-bottom: 16px; font-size: 18px; font-weight: 800;">Billing Status Directory</h3>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>Family Name</th><th>Assigned Programs</th><th>Combined Rate</th><th>Current Balance</th></tr></thead>
        <tbody>
          ${activeCusts.length === 0 ? `<tr><td colspan="4" style="text-align:center; color:var(--muted); padding: 40px;">No active customers.</td></tr>` : ''}
          ${activeCusts.map(c => {
            const custProgs = (c.progs || []).map(cp => {
              const p = programs.find(x => x.id === cp.id); return p ? { ...p, disc: cp.disc } : null;
            }).filter(Boolean);
            const bal = getCustomerBalance(c.id);
            const progBadges = custProgs.length > 0 ? custProgs.map(p => `<div class="badge" style="background:var(--surface2); color:var(--text2); margin-bottom:4px;">${p.name} ${p.disc ? '<span style="color:var(--pk-dk); margin-left:4px">(Discounted)</span>' : ''}</div>`).join('<br>') : '<span style="color:var(--muted)">Unassigned</span>';
            const wRate = custProgs.filter(p => p.freq === 'weekly').reduce((s, p) => s + (p.rate * (1 - p.disc/100)), 0);
            const mRate = custProgs.filter(p => p.freq === 'monthly').reduce((s, p) => s + (p.rate * (1 - p.disc/100)), 0);
            let rateTexts = [];
            if (wRate > 0) rateTexts.push(`$${fmtH(wRate)} / wk`);
            if (mRate > 0) rateTexts.push(`$${fmtH(mRate)} / mo`);
            const rateDisplay = rateTexts.length > 0 ? rateTexts.join('<br>') : '—';
            return `
              <tr class="row-clickable" data-a="sel-cust" data-cust="${c.id}">
                <td style="font-weight: 800; color: var(--blue)">${c.name}</td><td>${progBadges}</td>
                <td class="col-mono" style="font-size: 14px; color: var(--text2); line-height: 1.5;">${rateDisplay}</td>
                <td class="col-mono ${bal > 0 ? 'val-owed' : bal < 0 ? 'val-collected' : ''}">${bal > 0 ? '$'+fmtH(bal) : bal === 0 ? 'Paid' : '+$'+fmtH(Math.abs(bal))}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>

    ${archivedCusts.length > 0 ? `
      <h3 style="margin-top: 48px; margin-bottom: 16px; font-size: 18px; font-weight: 800; color: var(--text2);">Archived Families</h3>
      <div class="table-wrap" style="opacity: 0.7;">
        <table class="data-table">
          <thead><tr><th>Family Name</th><th>Assigned Programs</th><th>Combined Rate</th><th>Current Balance</th></tr></thead>
          <tbody>
            ${archivedCusts.map(c => {
              const custProgs = (c.progs || []).map(cp => {
                const p = programs.find(x => x.id === cp.id); return p ? { ...p, disc: cp.disc } : null;
              }).filter(Boolean);
              const bal = getCustomerBalance(c.id);
              const progBadges = custProgs.length > 0 ? custProgs.map(p => `<div class="badge" style="background:var(--surface2); color:var(--text2); margin-bottom:4px;">${p.name} ${p.disc ? '<span style="color:var(--pk-dk); margin-left:4px">(Discounted)</span>' : ''}</div>`).join('<br>') : '<span style="color:var(--muted)">Unassigned</span>';
              const wRate = custProgs.filter(p => p.freq === 'weekly').reduce((s, p) => s + (p.rate * (1 - p.disc/100)), 0);
              const mRate = custProgs.filter(p => p.freq === 'monthly').reduce((s, p) => s + (p.rate * (1 - p.disc/100)), 0);
              let rateTexts = [];
              if (wRate > 0) rateTexts.push(`$${fmtH(wRate)} / wk`);
              if (mRate > 0) rateTexts.push(`$${fmtH(mRate)} / mo`);
              const rateDisplay = rateTexts.length > 0 ? rateTexts.join('<br>') : '—';
              return `
                <tr class="row-clickable" data-a="sel-cust" data-cust="${c.id}">
                  <td style="font-weight: 800; color: var(--text2)">${c.name}</td><td>${progBadges}</td>
                  <td class="col-mono" style="font-size: 14px; color: var(--text2); line-height: 1.5;">${rateDisplay}</td>
                  <td class="col-mono ${bal > 0 ? 'val-owed' : bal < 0 ? 'val-collected' : ''}">${bal > 0 ? '$'+fmtH(bal) : bal === 0 ? 'Paid' : '+$'+fmtH(Math.abs(bal))}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    ` : ''}
  `;
}

function renderCustomerDetail() {
  const activeCust = DB.getCustomers().find(c => c.id === S.selCustId);
  if (!activeCust) return '';

  const programs = DB.getPrograms();
  const txns = DB.getTxns().filter(t => t.custId === activeCust.id).sort((a,b) => new Date(b.date) - new Date(a.date));
  const activeBal = getCustomerBalance(activeCust.id);
  const isDraftDirty = JSON.stringify(activeCust.progs || []) !== JSON.stringify(S.draftPrograms);

  return `
    <button class="btn btn-g" style="margin-bottom: 20px" data-a="nav" data-view="dashboard">← Back to Directory</button>
    <div class="detail-header">
      <div>
        <div class="detail-title">${activeCust.name} ${activeCust.archived ? '<span class="badge badge-rd" style="font-size: 12px;">Archived</span>' : ''} <button class="btn btn-g btn-sm" style="font-weight: 700; color:var(--muted);" data-a="open-modal" data-m="edit-customer">✏️ Edit Info</button></div>
        <div class="contact-strip">
          <div class="contact-item">📧 ${activeCust.email || '<span style="color:var(--border)">No Email</span>'}</div>
          <div class="contact-item">📞 ${activeCust.phone || '<span style="color:var(--border)">No Phone</span>'}</div>
          <div class="contact-item">📍 ${activeCust.address || '<span style="color:var(--border)">No Address</span>'}</div>
        </div>
        <div class="assign-box" style="${activeCust.archived ? 'opacity: 0.6; pointer-events: none;' : ''}">
          <label style="margin-bottom: 10px; font-size: 14px;">Assigned Programs</label>
          <div style="display:flex; flex-direction:column; gap:8px; margin-bottom: 12px; max-height: 280px; overflow-y: auto; padding-right: 4px;">
            ${S.draftPrograms.length === 0 ? '<div style="color:var(--muted); font-size:13px; font-style:italic;">No programs assigned.</div>' : ''}
            ${S.draftPrograms.map(dp => {
              const p = programs.find(x => x.id === dp.id); if(!p) return '';
              const isDisc = dp.disc === 10;
              return `
                <div style="background:var(--surface); padding:12px; border-radius:8px; border:1.5px solid var(--border);">
                  <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <span style="font-size:14px; font-weight:800; color:var(--text); line-height: 1.3;">
                      ${p.name}<br><span style="color: ${isDisc ? 'var(--pk-dk)' : 'var(--text2)'}; font-family:var(--mono)">$${fmtH(p.rate * (1 - (dp.disc/100)))}/${p.freq} ${isDisc ? '(10% Off)' : ''}</span>
                    </span>
                    <button class="btn btn-g" style="padding:6px 10px; font-size:11px;" data-a="remove-draft-prog" data-id="${p.id}">Remove</button>
                  </div>
                  <label class="checkbox-label"><input type="checkbox" data-a="toggle-discount" data-id="${p.id}" ${isDisc ? 'checked' : ''}>Apply 10% Sibling Discount</label>
                </div>
              `;
            }).join('')}
          </div>
          <div style="display:flex; gap:8px; margin-bottom: 16px;">
            <select id="draft-prog-select" style="flex:1; padding:8px; font-size:13px;"><option value="">-- Select to Add --</option>${programs.filter(p => !S.draftPrograms.find(dp => dp.id === p.id)).map(p => `<option value="${p.id}">${p.name}</option>`).join('')}</select>
            <button class="btn btn-b" data-a="add-draft-prog">Add</button>
          </div>
          <button class="btn btn-pk btn-full" style="opacity: ${isDraftDirty ? '1' : '0.5'}" data-a="apply-draft-progs" ${isDraftDirty ? '' : 'disabled'}>${isDraftDirty ? 'Apply Changes' : 'Saved'}</button>
        </div>
      </div>
      <div class="bal-box">
        <div class="stat-label">Current Balance</div>
        <div class="stat-value ${activeBal > 0 ? 'val-owed' : 'val-collected'}" style="margin-bottom: 16px;">${activeBal > 0 ? '$'+fmtH(activeBal) : 'Paid'}</div>
        <div style="display:flex; gap:10px; justify-content: flex-end;">
          <button class="btn btn-pk" data-a="open-modal" data-m="add-charge">+ Add Charge</button>
          <button class="btn btn-y" data-a="open-modal" data-m="add-payment">$ Receive Payment</button>
        </div>
      </div>
    </div>
    <h3 style="margin-bottom: 16px; font-size: 18px; font-weight: 800;">Ledger Timeline</h3>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>Date</th><th>Type</th><th>Description</th><th>Amount</th></tr></thead>
        <tbody>
          ${txns.length === 0 ? '<tr><td colspan="4" style="text-align:center; color:var(--muted); padding: 40px;">No transaction history yet.</td></tr>' : ''}
          ${txns.map(t => {
            let badge = '', note = '';
            if (t.type === 'charge') {
               badge = txns.find(p => p.type === 'payment' && p.linkedToId === t.id) ? '<span class="badge badge-gn" style="margin-left: 8px;">Paid</span>' : '<span class="badge badge-rd" style="margin-left: 8px;">Unpaid</span>';
            } else if (t.type === 'payment' && t.linkedToId) {
               const lCharge = txns.find(c => c.id === t.linkedToId);
               if (lCharge) note = `<br><span style="font-size:11px; color:var(--muted)">↳ Applied to ${new Date(lCharge.date).toLocaleDateString()} charge</span>`;
            }
            return `
              <tr class="row-clickable" data-a="edit-tx" data-id="${t.id}" data-type="${t.type}">
                <td class="col-mono" style="font-weight:600">${new Date(t.date).toLocaleDateString()}</td>
                <td><span class="badge badge-${t.type === 'payment' ? 'gn' : 'rd'}">${t.type === 'payment' ? 'Payment' : 'Charge'}</span>${badge}</td>
                <td style="color:var(--text); font-weight:600">${t.note}${note}</td>
                <td class="col-mono ${t.type === 'payment' ? 'val-collected' : 'val-owed'}">${t.type === 'payment' ? '-' : ''}$${fmtH(t.amount)}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function updateChargeDesc() {
  const s = document.getElementById('m-quick-rates'); if(!s || s.selectedIndex === -1) return;
  const o = s.options[s.selectedIndex];
  document.getElementById('m-amt').value = o.value;
  const type = o.getAttribute('data-type'), name = o.getAttribute('data-name'), freq = o.getAttribute('data-freq');
  document.getElementById('m-note').value = type === 'program' ? (freq === 'weekly' ? `${name} - Week of ${getNextMonday()}` : `${name} - Tuition for ${getNextMonth()}`) : (type === 'charge' ? name : '');
}

function renderModal() {
  if (!S.showModal) return '';
  const actCust = DB.getCustomers().find(c => c.id === S.selCustId);
  const progs = DB.getPrograms();
  const charges = DB.getCharges();

  if (S.showModal === 'add-customer' || S.showModal === 'edit-customer') {
    const e = S.showModal === 'edit-customer';
    const c = e ? actCust : { name: '', email: '', phone: '', address: '', archived: false };
    return `
      <div class="modal-overlay"><div class="modal">
        <h2>${e ? 'Edit Family Info' : 'Add New Family'}</h2>
        <div class="field"><label>Family Name</label><input type="text" id="m-name" value="${c.name}" placeholder="e.g. Smith Family" autocomplete="off"></div>
        <div style="display:flex; gap:12px">
          <div class="field" style="flex:1"><label>Email Address</label><input type="email" id="m-email" value="${c.email}" placeholder="name@example.com"></div>
          <div class="field" style="flex:1"><label>Phone Number</label><input type="tel" id="m-phone" value="${c.phone}" placeholder="(555) 555-5555"></div>
        </div>
        <div class="field"><label>Mailing Address</label><input type="text" id="m-address" value="${c.address}" placeholder="123 Main St, City, ST 12345"></div>
        <div style="display:flex; gap:12px; margin-top:28px">
          <button class="btn btn-b btn-full" data-a="save-customer" data-edit="${e}">${e ? 'Save Changes' : 'Create Family'}</button>
          <button class="btn btn-g btn-full" data-a="close-modal">Cancel</button>
        </div>
        ${e ? `
          <div style="margin-top: 24px; border-top: 1.5px solid var(--border); padding-top: 24px;">
            <button class="btn ${c.archived ? 'btn-g' : 'btn-rd'} btn-full" data-a="archive-customer">${c.archived ? 'Restore Family to Active Status' : 'Archive / Deactivate Family'}</button>
            ${c.archived ? `<button class="btn btn-rd btn-full" data-a="delete-customer" style="margin-top: 12px;">Delete Family Permanently</button>` : ''}
          </div>
        ` : ''}
      </div></div>
    `;
  }

  if (S.showModal === 'edit-program') {
    const e = !!S.tempId; const p = e ? progs.find(x => x.id === S.tempId) : { name: '', rate: '', freq: 'weekly' };
    return `
      <div class="modal-overlay"><div class="modal">
        <h2>${e ? 'Edit Program' : 'Create Program'}</h2>
        <div class="field"><label>Program Name</label><input type="text" id="m-prog-name" value="${p.name}" placeholder="e.g. Infant Care"></div>
        <div class="field"><label>Rate Price ($)</label><input type="number" id="m-prog-rate" step="0.01" value="${p.rate}" placeholder="0.00"></div>
        <div class="field"><label>Billing Frequency</label><select id="m-prog-freq"><option value="weekly" ${p.freq === 'weekly' ? 'selected' : ''}>Weekly</option><option value="monthly" ${p.freq === 'monthly' ? 'selected' : ''}>Monthly</option></select></div>
        <div style="display:flex; gap:12px; margin-top:28px">
          <button class="btn btn-y btn-full" data-a="save-program">Save</button>
          ${e ? `<button class="btn btn-rd" data-a="delete-program">Delete</button>` : ''}
          <button class="btn btn-g btn-full" data-a="close-modal">Cancel</button>
        </div>
      </div></div>
    `;
  }

  if (S.showModal === 'edit-charge') {
    const e = !!S.tempId; const c = e ? charges.find(x => x.id === S.tempId) : { name: '', amount: '' };
    return `
      <div class="modal-overlay"><div class="modal">
        <h2>${e ? 'Edit Standard Charge' : 'Create Standard Charge'}</h2>
        <div class="field"><label>Charge Name</label><input type="text" id="m-charge-name" value="${c.name}" placeholder="e.g. Half Day Fee"></div>
        <div class="field"><label>Amount ($)</label><input type="number" id="m-charge-amt" step="0.01" value="${c.amount}" placeholder="0.00"></div>
        <div style="display:flex; gap:12px; margin-top:28px">
          <button class="btn btn-pk btn-full" data-a="save-charge">Save</button>
          ${e ? `<button class="btn btn-rd" data-a="delete-charge">Delete</button>` : ''}
          <button class="btn btn-g btn-full" data-a="close-modal">Cancel</button>
        </div>
      </div></div>
    `;
  }

  if (S.showModal === 'add-charge') {
    const isEdit = !!S.tempId;
    const tx = isEdit ? DB.getTxns().find(t => t.id === S.tempId) : null;
    const defDate = tx ? tx.date : now.toISOString().split('T')[0];
    const defAmt = tx ? tx.amount : '';
    const defNote = tx ? tx.note : '';
    const cProgs = (actCust.progs || []).map(cp => { const p = progs.find(x => x.id === cp.id); return p ? { ...p, disc: cp.disc } : null; }).filter(Boolean);
    
    return `
      <div class="modal-overlay"><div class="modal">
        <h2>${isEdit ? 'Edit Charge' : 'Add Charge'}</h2><p style="font-size: 14px; font-weight: 800; color: var(--text2); margin-bottom: 20px;">Billing: <strong style="color: var(--blue)">${actCust?.name}</strong></p>

        ${!isEdit ? `
        <div class="field"><label>Quick Fill</label><select id="m-quick-rates"><option value="">-- Custom Charge --</option>
          ${cProgs.length > 0 ? `<optgroup label="Family's Assigned Programs">${cProgs.map(cp => { const amt = cp.rate * (1 - cp.disc/100); return `<option value="${amt}" data-type="program" data-name="${cp.name}" data-freq="${cp.freq}">${cp.name} ${cp.disc ? '(Discounted)' : ''} - $${fmtH(amt)}</option>`; }).join('')}</optgroup>` : ''}
          <optgroup label="Standard Charges">${charges.map(ch => `<option value="${ch.amount}" data-type="charge" data-name="${ch.name}">${ch.name} - $${fmtH(ch.amount)}</option>`).join('')}</optgroup>

        <div class="field"><label>Amount ($)</label><input type="number" id="m-amt" step="0.01" value="${defAmt}" placeholder="0.00"></div>

          ${isEdit ? `<button class="btn btn-rd" data-a="delete-tx">Delete</button>` : ''}

        </div>
      </div></div>
    `;
  }

  if (S.showModal === 'add-payment') {
    const isEdit = !!S.tempId;
    const tx = isEdit ? DB.getTxns().find(t => t.id === S.tempId) : null;

    const allTx = DB.getTxns();
    const defDate = tx ? tx.date : now.toISOString().split('T')[0];
    const defAmt = tx ? tx.amount : (aBal > 0 ? fmtH(aBal) : '');
    const defNote = tx ? tx.note : '';
    
    const uCharges = allTx.filter(t => t.custId === actCust.id && t.type === 'charge' && (!allTx.some(p => p.type === 'payment' && p.linkedToId === t.id && p.id !== (tx?tx.id:null))));
    return `
      <div class="modal-overlay"><div class="modal">
        <h2>${isEdit ? 'Edit Payment' : 'Receive Payment'}</h2><p style="font-size: 14px; font-weight: 800; color: var(--text2); margin-bottom: 20px;">Receiving from: <strong style="color: var(--blue)">${actCust?.name}</strong></p>
        <div class="field"><label>Apply to Specific Charge (Optional)</label><select id="m-linked-charge"><option value="">-- General Payment (Unlinked) --</option>${uCharges.map(c => `<option value="${c.id}" data-amt="${c.amount}" ${isEdit && tx.linkedToId === c.id ? 'selected' : ''}>${new Date(c.date).toLocaleDateString()} - ${c.note} ($${fmtH(c.amount)})</option>`).join('')}</select></div>
        <div class="field"><label>Date Received</label><input type="date" id="m-date" value="${defDate}"></div>
        <div class="field"><label>Amount Paid ($)</label><input type="number" id="m-amt" step="0.01" value="${defAmt}" placeholder="0.00"></div>
        <div class="field"><label>Payment Method / Note</label><input type="text" id="m-note" value="${defNote}" placeholder="e.g. Venmo, Check #1234"></div>
        <div style="display:flex; gap:12px; margin-top:28px">
          <button class="btn btn-y btn-full" data-a="save-tx" data-type="payment">${isEdit ? 'Save Changes' : 'Log Payment'}</button>
          ${isEdit ? `<button class="btn btn-rd" data-a="delete-tx">Delete</button>` : ''}
          <button class="btn btn-g btn-full" data-a="close-modal">Cancel</button>
        </div>
      </div></div>
    `;
  }
  return '';
}

function bindEvents() {
  document.querySelectorAll('input[data-a="toggle-discount"]').forEach(chk => {
    chk.onchange = (e) => { const d = S.draftPrograms.map(dp => dp.id === e.target.getAttribute('data-id') ? { ...dp, disc: e.target.checked ? 10 : 0 } : dp); set({ draftPrograms: d }); };
  });

  const rSel = document.getElementById('m-quick-rates'); if(rSel) rSel.onchange = updateChargeDesc;
  const lSel = document.getElementById('m-linked-charge');
  if(lSel) lSel.onchange = (e) => { if (e.target.selectedIndex > 0) document.getElementById('m-amt').value = e.target.options[e.target.selectedIndex].getAttribute('data-amt'); };

  document.querySelectorAll('[data-a]').forEach(btn => {
    btn.onclick = () => {
      const a = btn.getAttribute('data-a');
      if (a === 'nav') set({ view: btn.getAttribute('data-view') });
      if (a === 'open-modal') set({ showModal: btn.getAttribute('data-m'), tempId: null });
      if (a === 'close-modal') set({ showModal: null, tempId: null });
      
      if (a === 'sel-cust') {
        const id = btn.getAttribute('data-cust'); const c = DB.getCustomers().find(x => x.id === id);
        set({ view: 'customer', selCustId: id, draftPrograms: c && c.progs ? JSON.parse(JSON.stringify(c.progs)) : [] });
      }
      
      if (a === 'add-draft-prog') {
        const sel = document.getElementById('draft-prog-select');
        if (sel && sel.value && !S.draftPrograms.find(dp => dp.id === sel.value)) set({ draftPrograms: [...S.draftPrograms, {id: sel.value, disc: 0}] });
      }
      if (a === 'remove-draft-prog') set({ draftPrograms: S.draftPrograms.filter(dp => dp.id !== btn.getAttribute('data-id')) });
      if (a === 'apply-draft-progs') {
        if (btn.hasAttribute('disabled')) return;
        const custs = DB.getCustomers(); const idx = custs.findIndex(c => c.id === S.selCustId);
        if (idx > -1) { custs[idx].progs = [...S.draftPrograms]; DB.set('pt_customers_v7', custs); set({}); }
      }

      if (a === 'edit-prog') set({ showModal: 'edit-program', tempId: btn.getAttribute('data-id') });
      if (a === 'edit-charge') set({ showModal: 'edit-charge', tempId: btn.getAttribute('data-id') });
      
      if (a === 'edit-tx') {
        const id = btn.getAttribute('data-id');
        const type = btn.getAttribute('data-type');
        set({ showModal: type === 'charge' ? 'add-charge' : 'add-payment', tempId: id });
      }

      if (a === 'save-customer') {
        const n = document.getElementById('m-name').value.trim(), e = document.getElementById('m-email').value.trim(), p = document.getElementById('m-phone').value.trim(), add = document.getElementById('m-address').value.trim();
        if (!n) return;
        const custs = DB.getCustomers();
        if (btn.getAttribute('data-edit') === 'true') {
          const idx = custs.findIndex(c => c.id === S.selCustId);
          if (idx > -1) { custs[idx].name = n; custs[idx].email = e; custs[idx].phone = p; custs[idx].address = add; DB.set('pt_customers_v7', custs); set({ showModal: null }); }
        } else {
          const id = 'c_' + genId(); custs.push({ id, name: n, email: e, phone: p, address: add, progs: [], archived: false }); DB.set('pt_customers_v7', custs); set({ showModal: null, view: 'customer', selCustId: id, draftPrograms: [] });
        }
      }

      if (a === 'archive-customer') {
        if(confirm("Change this family's active status?")) {
          const custs = DB.getCustomers(); const idx = custs.findIndex(c => c.id === S.selCustId);
          if (idx > -1) { custs[idx].archived = !custs[idx].archived; DB.set('pt_customers_v7', custs); set({ showModal: null, view: 'dashboard', selCustId: null }); }
        }
      }

      if (a === 'delete-customer') {
        if(confirm("Permanently delete this family?")) {
          DB.set('pt_customers_v7', DB.getCustomers().filter(c => c.id !== S.selCustId));
          DB.set('pt_txns_v7', DB.getTxns().filter(t => t.custId !== S.selCustId));
          set({ showModal: null, view: 'dashboard', selCustId: null });
        }
      }

      if (a === 'save-program') {
        const n = document.getElementById('m-prog-name').value.trim(), r = parseFloat(document.getElementById('m-prog-rate').value), f = document.getElementById('m-prog-freq').value;
        if (!n || isNaN(r)) return;
        const p = DB.getPrograms();
        if (S.tempId) { const idx = p.findIndex(x => x.id === S.tempId); if (idx > -1) { p[idx].name = n; p[idx].rate = r; p[idx].freq = f; } } 
        else { p.push({ id: 'p_' + genId(), name: n, rate: r, freq: f }); }
        DB.set('pt_programs_v7', p); set({ showModal: null, tempId: null });
      }

      if (a === 'delete-program') {
        if(confirm("Delete this program?")) {
          DB.set('pt_programs_v7', DB.getPrograms().filter(p => p.id !== S.tempId));
          const c = DB.getCustomers().map(x => { if (x.progs) x.progs = x.progs.filter(dp => dp.id !== S.tempId); return x; });
          DB.set('pt_customers_v7', c); set({ showModal: null, tempId: null });
        }
      }

      if (a === 'save-charge') {
        const n = document.getElementById('m-charge-name').value.trim(), amt = parseFloat(document.getElementById('m-charge-amt').value);
        if (!n || isNaN(amt)) return;
        const c = DB.getCharges();
        if (S.tempId) { const idx = c.findIndex(x => x.id === S.tempId); if (idx > -1) { c[idx].name = n; c[idx].amount = amt; } } 
        else { c.push({ id: 'ch_' + genId(), name: n, amount: amt }); }
        DB.set('pt_charges_v7', c); set({ showModal: null, tempId: null });
      }

      if (a === 'delete-charge') {
        if(confirm("Delete this standard charge?")) { DB.set('pt_charges_v7', DB.getCharges().filter(c => c.id !== S.tempId)); set({ showModal: null, tempId: null }); }
      }

      if (a === 'delete-tx') {
        if(confirm("Are you sure you want to permanently delete this transaction?")) {
          DB.set('pt_txns_v7', DB.getTxns().filter(t => t.id !== S.tempId)); 
          set({ showModal: null, tempId: null }); 
        }
      }

      if (a === 'save-tx') {
        const type = btn.getAttribute('data-type'), amt = parseFloat(document.getElementById('m-amt').value), d = document.getElementById('m-date').value, note = document.getElementById('m-note').value.trim();
        if (isNaN(amt) || !d) return;
        let lId = null;
        if (type === 'payment') { const s = document.getElementById('m-linked-charge'); if (s && s.value) lId = s.value; }
        
        const txns = DB.getTxns();
        if (S.tempId) {
          const idx = txns.findIndex(t => t.id === S.tempId);
          if (idx > -1) {
            txns[idx].amount = amt; txns[idx].date = d; txns[idx].note = note || (type === 'charge' ? 'Manual Charge' : 'Payment'); txns[idx].linkedToId = lId;
          }
        } else {
          txns.push({ id: 'tx_' + genId(), custId: S.selCustId, type, amount: amt, date: d, note: note || (type === 'charge' ? 'Manual Charge' : 'Payment'), linkedToId: lId });
        }
        DB.set('pt_txns_v7', txns); set({ showModal: null, tempId: null });
      }
    };
  });
}

render();
</script>
</body>
</html>
