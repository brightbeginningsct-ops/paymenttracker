<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bright Beginnings · Payments</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    /* ── EXACT TIMECLOCK CSS VARIABLES ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f6fb; --surface: #fff; --surface2: #f0f4fa; --border: #dce3f0;
      --yellow: #f9c522; --yw-lt: #fff8d6; --yw-dk: #9a6a00;
      --blue: #3bbde0; --bl-lt: #e0f6fc; --bl-dk: #1a8fb0;
      --royal: #4169E1; --ry-lt: #ecf0ff; --ry-dk: #2b4491;
      --green: #55b86e; --gn-lt: #e6f5ea; --gn-dk: #2e7d42;
      --red: #e8534e; --rd-lt: #fdecea; --rd-dk: #b02020;
      --text: #28304a; --text2: #5a618a; --muted: #9aa3c5;
      --font: 'Nunito', sans-serif; --display: 'Fredoka One', cursive; --mono: 'JetBrains Mono', monospace;
      --r: 14px; --sh: 0 2px 12px rgba(40,48,74,.08); --sh2: 0 6px 28px rgba(40,48,74,.13);
    }
    
    html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; overflow: hidden; }
    #app { height: 100%; display: flex; }

    /* UTILITY BUTTONS */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 20px; border: none; border-radius: 100px; font-family: var(--font); font-size: 14px; font-weight: 800; cursor: pointer; transition: all .14s; user-select: none; white-space: nowrap; }
    .btn:active { transform: scale(.95); }
    .btn-y { background: var(--yellow); color: var(--yw-dk); box-shadow: 0 3px 10px rgba(249,197,34,.4); }
    .btn-b { background: var(--blue); color: #fff; box-shadow: 0 3px 10px rgba(59,189,224,.35); }
    .btn-g { background: var(--surface); color: var(--text2); border: 1.5px solid var(--border); }
    .btn-royal { background: var(--royal); color: #fff; box-shadow: 0 3px 10px rgba(65,105,225,.35); }
    .btn-rd { background: var(--rd-lt); color: var(--rd-dk); border: 1.5px solid rgba(232,83,78,.25); }
    .btn-full { width: 100%; } .btn-sm { padding: 6px 12px; font-size: 12px; }

    input, select { background: var(--surface2); border: 1.5px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 14px; font-family: var(--font); font-size: 15px; width: 100%; outline: none; transition: border-color 0.15s; }
    input:focus, select:focus { border-color: var(--blue); background: var(--surface); box-shadow: 0 0 0 3px var(--bl-lt); }
    label { font-size: 13px; color: var(--text2); font-weight: 800; display: block; margin-bottom: 6px; }
    .field { margin-bottom: 16px; }

    .badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 100px; font-size: 12px; font-weight: 800; }
    .badge-gn { background: var(--gn-lt); color: var(--gn-dk); }
    .badge-rd { background: var(--rd-lt); color: var(--rd-dk); }
    .badge-royal { background: var(--ry-lt); color: var(--royal); }

    /* LAYOUT */
    .sidebar { width: 260px; background: var(--surface); border-right: 1.5px solid var(--border); display: flex; flex-direction: column; z-index: 10; box-shadow: 2px 0 12px rgba(40,48,74,.05); }
    .brand-area { padding: 24px; border-bottom: 1.5px solid var(--border); }
    .brand { font-family: var(--display); font-size: 24px; color: var(--blue); line-height: 1.2; }
    .nav-menu { padding: 20px 12px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .nav-item { padding: 12px 16px; border-radius: 12px; font-weight: 800; color: var(--text2); cursor: pointer; transition: 0.15s; display: flex; align-items: center; gap: 10px; border: 1.5px solid transparent; }
    .nav-item.active { background: var(--bl-lt); color: var(--bl-dk); border-color: var(--blue); }

    .main-content { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow-y: auto; }
    .topbar { padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; }
    .content-wrap { padding: 0 32px 40px; max-width: 1100px; margin: 0 auto; width: 100%; }

    /* STATS GRID */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .card { background: var(--surface); border-radius: var(--r); padding: 24px; box-shadow: var(--sh); border: 1.5px solid transparent; }
    .stat-label { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 8px; }
    .stat-value { font-family: var(--display); font-size: 32px; }
    .val-owed { color: var(--red); }
    .val-collected { color: var(--green); }

    .table-wrap { background: var(--surface); border-radius: var(--r); overflow: hidden; box-shadow: var(--sh); border: 1.5px solid var(--border); }
    .data-table { width: 100%; border-collapse: collapse; font-size: 15px; text-align: left; }
    .data-table th { background: var(--surface2); padding: 14px 20px; font-size: 13px; font-weight: 800; color: var(--text2); border-bottom: 1.5px solid var(--border); }
    .data-table td { padding: 16px 20px; border-bottom: 1.5px solid var(--border); vertical-align: middle; font-weight: 600; }
    .row-clickable { cursor: pointer; transition: 0.1s; }
    .row-clickable:hover td { background: var(--surface2); }
    .col-mono { font-family: var(--mono); }

    /* DETAIL HEADER */
    .detail-header { background: var(--surface); border-radius: var(--r); padding: 24px 32px; box-shadow: var(--sh); border: 1.5px solid var(--border); margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-start; }
    .detail-title { font-family: var(--display); font-size: 32px; color: var(--text); margin-bottom: 8px; display:flex; align-items:center; gap:16px;}
    .assign-box { background: var(--surface2); padding: 20px; border-radius: 12px; border: 1.5px solid var(--border); width: 420px; }
    .bal-box { text-align: right; }
    
    .batch-alert { background: var(--ry-lt); border: 2px solid var(--royal); padding: 20px 24px; border-radius: 16px; margin-bottom: 32px; display: flex; justify-content: space-between; align-items: center; color: var(--ry-dk); font-weight: 800; box-shadow: var(--sh); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(40,48,74,0.6); display: flex; align-items: center; justify-content: center; z-index: 500; padding: 20px; backdrop-filter: blur(3px); }
    .modal { background: var(--surface); border-radius: 24px; padding: 32px; width: 100%; max-width: 480px; box-shadow: var(--sh2); border: 2px solid var(--border); }
  </style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getDatabase, ref, set as fbSet, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAsUF58_SpcTCNGGirwhHd5bfS_4JE4QcM",
  authDomain: "bright-beginnings-timeclock.firebaseapp.com",
  databaseURL: "https://bright-beginnings-timeclock-default-rtdb.firebaseio.com",
  projectId: "bright-beginnings-timeclock",
  storageBucket: "bright-beginnings-timeclock.firebasestorage.app",
  messagingSenderId: "873798614696",
  appId: "1:873798614696:web:9f0bebaafb146cc0b30c9d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// UTILS
const genId = () => Math.random().toString(36).substr(2, 9);
function fmtH(h) { return (h || 0).toFixed(2); }
function fmtD(str) { if (!str) return ''; const parts = str.split('-'); return parts.length !== 3 ? str : parseInt(parts[1]) + '/' + parseInt(parts[2]) + '/' + parts[0]; }

// DATE LOGIC
const getMondayISO = () => {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.setDate(diff)).toISOString().split('T')[0];
};
const getMonthFirstISO = () => {
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), 1).toISOString().split('T')[0];
};

// STATE
let dbCache = { pt_programs_v7: [], pt_charges_v7: [], pt_customers_v7: [], pt_txns_v7: [] };
const DB = {
  getPrograms() { return dbCache.pt_programs_v7 || []; },
  getCharges() { return dbCache.pt_charges_v7 || []; },
  getCustomers() { return dbCache.pt_customers_v7 || []; },
  getTxns() { return dbCache.pt_txns_v7 || []; },
  set(k, v) { dbCache[k] = v; fbSet(ref(db, 'bb_payments_system/' + k), v); }
};

let S = { view: 'dashboard', selCustId: null, showModal: null, tempId: null };
function set(patch) { Object.assign(S, patch); render(); }
window.set = set; 

function getCustomerBalance(custId) {
  return DB.getTxns().filter(t => t.custId === custId).reduce((sum, t) => sum + (t.type === 'charge' ? t.amount : -t.amount), 0);
}

// BATCH DETECTOR
function getPendingCharges() {
  const families = DB.getCustomers().filter(c => !c.archived);
  const programs = DB.getPrograms();
  const txns = DB.getTxns();
  const pending = [];

  families.forEach(f => {
    (f.progs || []).forEach(fp => {
      if (fp.status === 'paused') return;
      const p = programs.find(x => x.id === fp.id);
      if (!p) return;
      const targetDate = p.freq === 'weekly' ? getMondayISO() : getMonthFirstISO();
      const alreadyBilled = txns.some(t => t.custId === f.id && t.date === targetDate && t.note.includes(p.name));
      if (!alreadyBilled) pending.push({ family: f, prog: p, config: fp, date: targetDate });
    });
  });
  return pending;
}

function processBatchBilling() {
  const pending = getPendingCharges();
  if (!pending.length) return;
  const currentTxns = [...DB.getTxns()];
  pending.forEach(item => {
    const finalAmt = item.prog.rate * (1 - (item.config.disc || 0) / 100);
    const label = item.prog.freq === 'weekly' ? `${item.prog.name} (Week of ${fmtD(item.date)})` : `${item.prog.name} (${new Date().toLocaleString('default', { month: 'long' })} Tuition)`;
    currentTxns.push({ id: 'tx_' + genId(), custId: item.family.id, type: 'charge', amount: finalAmt, date: item.date, note: label, linkedToId: null });
  });
  DB.set('pt_txns_v7', currentTxns);
}

onValue(ref(db, 'bb_payments_system'), (snapshot) => {
  const data = snapshot.val();
  if (data) { dbCache = { ...dbCache, ...data }; render(); }
});

function render() {
  const app = document.getElementById('app');
  if(!app) return;
  let main = '', title = '';
  if (S.view === 'dashboard') { main = renderDashboard(); title = 'Dashboard Overview'; } 
  else if (S.view === 'programs') { main = renderPrograms(); title = 'Programs'; } 
  else if (S.view === 'charges') { main = renderCharges(); title = 'Standard Charges'; } 
  else if (S.view === 'customer') { main = renderCustomerDetail(); title = 'Family Ledger'; }

  app.innerHTML = `
    <aside class="sidebar">
      <div class="brand-area"><div class="brand">Bright Beginnings<br><span style="color:var(--royal)">Payments</span></div></div>
      <nav class="nav-menu">
        <div class="nav-item ${S.view === 'dashboard' ? 'active' : ''}" data-a="nav" data-view="dashboard">📊 Dashboard Overview</div>
        <div class="nav-item ${S.view === 'programs' ? 'active' : ''}" data-a="nav" data-view="programs">📋 Programs</div>
        <div class="nav-item ${S.view === 'charges' ? 'active' : ''}" data-a="nav" data-view="charges">💸 Standard Charges</div>
        <div style="height: 1.5px; background: var(--border); margin: 8px 0"></div>
        <div class="nav-item" data-a="open-modal" data-m="add-customer">👨‍👩‍👧‍👦 Add New Family</div>
      </nav>
    </aside>
    <main class="main-content">
      <div class="topbar"><h2 style="font-size: 20px; font-weight: 800; color: var(--text2)">${title}</h2></div>
      <div class="content-wrap">${main}</div>
    </main>
    ${renderModal()}
  `;
  bindEvents();
}

function renderDashboard() {
  const custs = DB.getCustomers().filter(c => !c.archived);
  const progs = DB.getPrograms();
  const pending = getPendingCharges();
  let owed = 0, collected = 0;
  custs.forEach(c => { const b = getCustomerBalance(c.id); if (b > 0) owed += b; });
  DB.getTxns().forEach(t => { if (t.type === 'payment') collected += t.amount; });

  return `
    ${pending.length > 0 ? `<div class="batch-alert"><span>⚠️ ${pending.length} pending recurring charges found for this period.</span><button class="btn btn-royal" data-a="run-batch">Process Recurring Billing</button></div>` : ''}
    
    <div class="stats-grid">
      <div class="card" style="background:var(--rd-lt); border-color: rgba(232,83,78,.25)"><div class="stat-label">Active Outstanding</div><div class="stat-value val-owed">$${fmtH(owed)}</div></div>
      <div class="card" style="background:var(--gn-lt); border-color: rgba(85,184,110,.25)"><div class="stat-label">Total Collected</div><div class="stat-value val-collected">$${fmtH(collected)}</div></div>
      <div class="card" style="background:var(--bl-lt); border-color: rgba(59,189,224,.25)"><div class="stat-label">Active Families</div><div class="stat-value" style="color:var(--bl-dk)">${custs.length}</div></div>
    </div>

    <div class="table-wrap"><table class="data-table">
      <thead><tr><th>Family Name</th><th>Assigned Programs</th><th>Balance</th></tr></thead>
      <tbody>${custs.map(c => {
        const bal = getCustomerBalance(c.id);
        const badges = (c.progs||[]).map(fp => {
          const p = progs.find(x => x.id === fp.id);
          return p ? `<div class="badge badge-royal" style="margin-right:4px; margin-bottom:4px;">${p.name}</div>` : '';
        }).join('');
        return `<tr class="row-clickable" data-a="sel-cust" data-cust="${c.id}"><td style="font-weight:800;color:var(--royal)">${c.name}</td><td>${badges || '<span style="color:var(--muted)">None</span>'}</td><td class="col-mono ${bal>0?'val-owed':''}">${bal>0?'$'+fmtH(bal):'Paid'}</td></tr>`;
      }).join('')}</tbody>
    </table></div>
  `;
}

function renderPrograms() {
  const p = DB.getPrograms();
  return `
    <div style="margin-bottom:24px"><button class="btn btn-y" data-a="open-modal" data-m="edit-program">+ Create Program</button></div>
    <div class="table-wrap"><table class="data-table">
      <thead><tr><th>Name</th><th>Rate</th><th>Freq</th></tr></thead>
      <tbody>${p.map(x => `<tr class="row-clickable" data-a="edit-prog" data-id="${x.id}"><td style="color:var(--royal)">${x.name}</td><td class="col-mono">$${fmtH(x.rate)}</td><td style="text-transform:capitalize">${x.freq}</td></tr>`).join('')}</tbody>
    </table></div>
  `;
}

function renderCharges() {
  const c = DB.getCharges();
  return `
    <div style="margin-bottom:24px"><button class="btn btn-royal" data-a="open-modal" data-m="edit-charge">+ Create Charge</button></div>
    <div class="table-wrap"><table class="data-table">
      <thead><tr><th>Charge Name</th><th>Amount</th></tr></thead>
      <tbody>${c.map(x => `<tr class="row-clickable" data-a="edit-charge" data-id="${x.id}"><td style="color:var(--royal)">${x.name}</td><td class="col-mono">$${fmtH(x.amount)}</td></tr>`).join('')}</tbody>
    </table></div>
  `;
}

function renderCustomerDetail() {
  const c = DB.getCustomers().find(x => x.id === S.selCustId);
  if (!c) return '';
  const bal = getCustomerBalance(c.id);
  const progs = DB.getPrograms();
  const txns = DB.getTxns().filter(t => t.custId === c.id).sort((a,b) => new Date(b.date) - new Date(a.date));

  return `
    <button class="btn btn-g" style="margin-bottom:20px" data-a="nav" data-view="dashboard">← Back to Dashboard</button>
    <div class="detail-header">
      <div>
        <div class="detail-title">${c.name} <button class="btn btn-g btn-sm" data-a="open-modal" data-m="edit-customer">Edit Info</button></div>
        <div class="assign-box">
          <label>Recurring Subscriptions</label>
          <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px">
            ${(c.progs || []).map(dp => {
              const p = progs.find(x => x.id === dp.id); if(!p) return '';
              const isActive = dp.status !== 'paused';
              return `
                <div style="background:var(--surface);padding:12px;border-radius:8px;border:1.5px solid var(--border)">
                  <div style="display:flex;justify-content:space-between;align-items:center">
                    <span style="font-weight:800;font-size:14px">${p.name} ($${fmtH(p.rate*(1-(dp.disc||0)/100))})</span>
                    <div style="display:flex;gap:5px">
                      <button class="btn btn-sm ${isActive?'btn-g':'btn-y'}" data-a="toggle-recur" data-id="${p.id}">${isActive?'Active':'Paused'}</button>
                      <button class="btn btn-sm btn-rd" data-a="remove-draft-prog" data-id="${p.id}">End</button>
                    </div>
                  </div>
                </div>`;
            }).join('')}
          </div>
          <div style="display:flex;gap:8px"><select id="psel"><option value="">Assign Program...</option>${progs.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}</select><button class="btn btn-b" data-a="add-draft-prog">Add</button></div>
        </div>
      </div>
      <div class="bal-box">
        <div class="stat-label">Balance</div><div class="stat-value ${bal>0?'val-owed':''}">${bal>0?'$'+fmtH(bal):'Paid'}</div>
        <div style="display:flex;gap:10px;margin-top:15px"><button class="btn btn-royal" data-a="open-modal" data-m="add-charge">+ Charge</button><button class="btn btn-y" data-a="open-modal" data-m="add-payment">$ Payment</button></div>
      </div>
    </div>
    <div class="table-wrap"><table class="data-table">
      <thead><tr><th>Date</th><th>Description</th><th>Amount</th></tr></thead>
      <tbody>${txns.map(t => {
        let note = '';
        if (t.type === 'payment' && t.linkedToId) {
          const lc = DB.getTxns().find(x => x.id === t.linkedToId);
          if (lc) note = `<br><span style="font-size:11px; color:var(--muted)">↳ Applied to ${fmtD(lc.date)} charge</span>`;
        }
        return `<tr class="row-clickable" data-a="edit-tx" data-id="${t.id}" data-type="${t.type}"><td>${fmtD(t.date)}</td><td>${t.note}${note}</td><td class="col-mono ${t.type==='charge'?'val-owed':''}">${t.type==='payment'?'-':''}$${fmtH(t.amount)}</td></tr>`;
      }).join('')}</tbody>
    </table></div>
  `;
}

function renderModal() {
  if (!S.showModal) return '';
  const c = DB.getCustomers().find(x => x.id === S.selCustId);
  const tx = S.tempId ? DB.getTxns().find(t => t.id === S.tempId) : null;
  const isEdit = !!S.tempId;

  if (S.showModal === 'add-customer' || S.showModal === 'edit-customer') {
    const edit = S.showModal === 'edit-customer';
    return `<div class="modal-overlay"><div class="modal"><h2>${edit?'Edit':'Add'} Family</h2><div class="field"><label>Name</label><input type="text" id="m-n" value="${edit?c.name:''}"></div><button class="btn btn-royal btn-full" data-a="save-customer" data-edit="${edit}">Save</button><button class="btn btn-g btn-full" style="margin-top:10px" data-a="close-modal">Cancel</button></div></div>`;
  }
  if (S.showModal === 'add-charge' || S.showModal === 'add-payment') {
    const type = S.showModal === 'add-charge' ? 'charge' : 'payment';
    return `<div class="modal-overlay"><div class="modal"><h2>${isEdit?'Edit':'New'} ${type}</h2>
      <div class="field"><label>Date</label><input type="date" id="m-d" value="${tx?tx.date:new Date().toISOString().split('T')[0]}"></div>
      <div class="field"><label>Amount</label><input type="number" step="0.01" id="m-a" value="${tx?tx.amount:''}"></div>
      <div class="field"><label>Note</label><input type="text" id="m-nt" value="${tx?tx.note:''}"></div>
      <button class="btn btn-royal btn-full" data-a="save-tx" data-type="${type}">Save</button>
      ${isEdit?'<button class="btn btn-rd btn-full" style="margin-top:10px" data-a="delete-tx">Delete</button>':''}
      <button class="btn btn-g btn-full" style="margin-top:10px" data-a="close-modal">Cancel</button>
    </div></div>`;
  }
  return '';
}

function bindEvents() {
  document.querySelectorAll('[data-a]').forEach(b => {
    b.onclick = () => {
      const a = b.getAttribute('data-a');
      if (a === 'nav') set({ view: b.getAttribute('data-view') });
      if (a === 'run-batch') { processBatchBilling(); render(); }
      if (a === 'open-modal') set({ showModal: b.getAttribute('data-m'), tempId: null });
      if (a === 'close-modal') set({ showModal: null, tempId: null });
      if (a === 'sel-cust') set({ view: 'customer', selCustId: b.getAttribute('data-cust') });
      if (a === 'edit-tx') set({ showModal: b.getAttribute('data-type')==='charge'?'add-charge':'add-payment', tempId: b.getAttribute('data-id') });
      
      if (a === 'toggle-recur') {
        const pid = b.getAttribute('data-id');
        const custs = DB.getCustomers(); const idx = custs.findIndex(x => x.id === S.selCustId);
        custs[idx].progs = (custs[idx].progs || []).map(p => p.id === pid ? { ...p, status: p.status === 'paused' ? 'active' : 'paused' } : p);
        DB.set('pt_customers_v7', custs);
      }
      if (a === 'add-draft-prog') {
        const id = document.getElementById('psel').value;
        if (id) {
          const custs = DB.getCustomers(); const idx = custs.findIndex(x => x.id === S.selCustId);
          custs[idx].progs = [...(custs[idx].progs || []), { id, disc: 0, status: 'active' }];
          DB.set('pt_customers_v7', custs);
        }
      }
      if (a === 'remove-draft-prog') {
        const custs = DB.getCustomers(); const idx = custs.findIndex(x => x.id === S.selCustId);
        custs[idx].progs = (custs[idx].progs || []).filter(p => p.id !== b.getAttribute('data-id'));
        DB.set('pt_customers_v7', custs);
      }
      if (a === 'save-customer') {
        const n = document.getElementById('m-n').value; if(!n) return;
        const custs = DB.getCustomers();
        if (b.getAttribute('data-edit') === 'true') { custs.find(x => x.id === S.selCustId).name = n; } 
        else { custs.push({ id: 'c_'+genId(), name: n, progs: [], archived: false }); }
        DB.set('pt_customers_v7', custs); set({ showModal: null });
      }
      if (a === 'delete-tx') { if(confirm("Delete?")) { DB.set('pt_txns_v7', DB.getTxns().filter(x => x.id !== S.tempId)); set({ showModal: null }); } }
      if (a === 'save-tx') {
        const d = document.getElementById('m-d').value, amt = parseFloat(document.getElementById('m-a').value), nt = document.getElementById('m-nt').value;
        if(!d || isNaN(amt)) return;
        const txs = DB.getTxns();
        if (S.tempId) { const i = txs.findIndex(x => x.id === S.tempId); txs[i] = { ...txs[i], date: d, amount: amt, note: nt }; }
        else { txs.push({ id: 'tx_'+genId(), custId: S.selCustId, type: b.getAttribute('data-type'), date: d, amount: amt, note: nt }); }
        DB.set('pt_txns_v7', txs); set({ showModal: null });
      }
    };
  });
}
render();
</script>
</body>
</html>
